name: Generate Telemetry Stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/generated/**"
      - "data/raw/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest PyYAML

      - name: Run tests
        run: python -m pytest tests

      - name: Generate telemetry statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_telemetry_stats.py \
            --repo . \
            --output data/generated \
            --raw-output data/raw/github \
            --config config/stats_config.yml \
            --include-open-prs \
            --refresh-github-cache

      - name: Upload generated stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-stats
          path: |
            data/generated/**
            data/raw/github/*.jsonl

      - name: Commit generated public data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated
          if ! git diff --cached --quiet; then
            git commit -m "Generate telemetry statistics [skip stats]"
            git push
          fi
